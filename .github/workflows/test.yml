name: Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v3

      - name: Install Python deps
        run: uv sync --frozen

      - name: System dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends ffmpeg
          curl -fsSL https://github.com/rhasspy/piper/releases/download/2023.11.14-2/piper_linux_x86_64.tar.gz -o /tmp/piper.tar.gz
          sudo tar -xzf /tmp/piper.tar.gz -C /opt
          sudo ln -sf /opt/piper/piper /usr/local/bin/piper

      - name: Pre-download faster-whisper model
        run: uv run python -c "from faster_whisper import WhisperModel; WhisperModel('tiny', device='cpu', compute_type='int8')"

      - name: Pre-download piper voice
        env:
          PIPER_VOICE_DIR: ${{ github.workspace }}/models/piper
        run: |
          mkdir -p "$PIPER_VOICE_DIR"
          bash scripts/download_piper_voice.sh gosia-medium

      - name: Ruff
        run: uv run ruff check .

      - name: Tests with coverage
        run: |
          uv run pytest tests/ \
            --cov=app --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=80

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.xml
          retention-days: 14
