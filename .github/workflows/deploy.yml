name: Deploy to Aurora

on:
  workflow_run:
    workflows: ["Tests"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to deploy (e.g., v0.2.0). Leave empty to build latest."
        required: false
        type: string
      skip_build:
        description: "Skip build; deploy an existing tag."
        required: false
        default: false
        type: boolean

concurrency:
  group: deploy-aurora-audio-mcp
  cancel-in-progress: false

jobs:
  build-and-push:
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && inputs.skip_build != true)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
      - id: version
        run: echo "version=$(python3 scripts/version.py)" >> $GITHUB_OUTPUT
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - id: meta
        run: |
          TAG="${{ inputs.version }}"
          if [ -z "$TAG" ]; then TAG="v${{ steps.version.outputs.version }}"; fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/audio-mcp:${{ steps.meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/audio-mcp:latest
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          no-cache: true

  deploy:
    if: >-
      ${{ !cancelled() && (needs.build-and-push.result == 'success' ||
        (github.event_name == 'workflow_dispatch' && inputs.skip_build == true)) }}
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
            [ -z "$TAG" ] && TAG="${{ needs.build-and-push.outputs.image_tag }}"
          else
            TAG="${{ needs.build-and-push.outputs.image_tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags: tag:ci
      - env:
          DEPLOY_TAG: ${{ steps.resolve.outputs.tag }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}
        run: |
          ssh -o StrictHostKeyChecking=no usterk@aurora << 'EOF'
            set -e
            cd /opt/apps/audio-mcp
            docker pull $REGISTRY/audio-mcp:$DEPLOY_TAG
            sed -i '/^IMAGE_TAG=/d' .env
            echo "IMAGE_TAG=$DEPLOY_TAG" >> .env
            docker compose up -d --remove-orphans --force-recreate
            sleep 10
            docker compose exec -T audio-mcp curl -fsS http://localhost:8000/health || {
              docker compose logs audio-mcp --tail 50
              exit 1
            }
            docker image prune -f
          EOF
