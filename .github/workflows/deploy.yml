name: Deploy
on:
  workflow_run:
    workflows: ["Tests"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
concurrency:
  group: deploy-aurora-audio-mcp
  cancel-in-progress: false
jobs:
  trigger:
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for versioning)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
      - name: Compute app version (conventional commits)
        id: ver
        run: echo "version=$(bash scripts/app-version.sh 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"
      - name: Mint Aurora App token (scoped to infra-poziomka)
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.AURORA_APP_ID }}
          private-key: ${{ secrets.AURORA_APP_PRIVATE_KEY }}
          owner: usterk
          repositories: infra-poziomka
      - name: Trigger build+deploy on the Aurora self-hosted runner
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          gh workflow run deploy-runner.yml --repo usterk/infra-poziomka \
            -f app=audio-mcp -f sha=${{ github.event.workflow_run.head_sha || github.sha }} \
            -f version=${{ steps.ver.outputs.version }}
